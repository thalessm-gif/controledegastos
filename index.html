<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle da Casa</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="background-orb background-orb-left"></div>
    <div class="background-orb background-orb-right"></div>

    <main class="page-shell">
      <header class="hero hero-compact">
        <div class="hero-copy">
          <p class="eyebrow">Casa de THALES e CÁTIA</p>
          <h1>Controle da Casa</h1>
          <div class="page-links page-links-inline">
            <a class="link-chip link-chip-current" href="index.html">Lançamentos</a>
            <a class="link-chip" href="cartoes.html">Cartões</a>
            <a class="link-chip" href="orcamento.html">Orçamento</a>
          </div>
        </div>

        <div class="hero-actions hero-actions-compact">
          <label class="field-inline field-inline-compact field-inline-centered">
            <span>Mês em foco</span>
            <input id="selectedMonth" type="month" />
          </label>
        </div>
      </header>

      <section class="workspace-grid">
        <section class="panel panel-wide">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Lançamento rápido</p>
              <h2>Novo gasto</h2>
            </div>
          </div>

          <form id="purchaseForm" class="entry-form">
            <input name="entryId" type="hidden" />
            <div class="form-grid launch-grid">
              <label class="field">
                <span>Responsável</span>
                <select name="responsible" id="responsibleSelect" required></select>
              </label>

              <label class="field field-short">
                <span>Data</span>
                <input name="date" type="date" required />
              </label>

              <label class="field">
                <span>Valor</span>
                <input
                  name="amount"
                  id="purchaseAmountInput"
                  type="text"
                  inputmode="numeric"
                  autocomplete="off"
                  placeholder="0,00"
                  required
                />
              </label>

              <label class="field">
                <span>Categoria</span>
                <select name="category" id="categorySelect" required></select>
              </label>

              <label class="field field-full hidden" id="customCategoryField">
                <span>Outro: descrever categoria</span>
                <input
                  name="customCategory"
                  id="customCategoryInput"
                  type="text"
                  maxlength="60"
                  placeholder="Ex.: presente, manutenção, taxa eventual"
                />
              </label>

              <label class="field">
                <span>Tipo de pagamento</span>
                <select name="paymentType" id="paymentTypeSelect" required>
                  <option value="pix">Pix</option>
                  <option value="debito">Débito</option>
                  <option value="credito">Crédito</option>
                  <option value="dinheiro">Dinheiro</option>
                  <option value="boleto">Boleto</option>
                </select>
              </label>

              <label class="field">
                <span>Cartão</span>
                <select name="cardId" id="cardSelect">
                  <option value="">Não se aplica</option>
                </select>
              </label>

              <label class="field field-short">
                <span>Nº de parcelas</span>
                <input
                  name="installments"
                  id="installmentsInput"
                  type="number"
                  min="1"
                  max="48"
                  step="1"
                  value="1"
                  required
                />
              </label>

              <label class="field field-full">
                <span>Observação</span>
                <input name="notes" type="text" maxlength="180" />
              </label>
            </div>

            <div class="form-actions split-actions">
              <span id="purchaseFormHint" class="form-hint">
                Se for no crédito, o sistema calcula sozinho o mês de cobrança.
              </span>
              <button
                id="purchaseCancelButton"
                class="button button-secondary hidden"
                type="button"
              >
                Cancelar edição
              </button>
              <button id="purchaseSubmitButton" class="button" type="submit">
                Salvar gasto
              </button>
            </div>
          </form>

        </section>
      </section>

      <section class="stats-grid" id="statsGrid"></section>

      <section class="workspace-grid">
        <section class="panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Mês selecionado</p>
              <h2>Gastos do mês</h2>
            </div>
          </div>

          <div class="mini-filters">
            <label class="field">
              <span>Responsável</span>
              <select id="summaryResponsibleFilter"></select>
            </label>

            <label class="field">
              <span>Cartão</span>
              <select id="summaryCardFilter"></select>
            </label>

            <div class="filter-action">
              <button id="clearSummaryFilters" class="button button-secondary" type="button">
                Limpar filtros
              </button>
            </div>
          </div>

          <div id="monthSummaryText" class="table-summary"></div>
          <div id="monthCharges" class="charge-list"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Parcelados</p>
              <h2>Compras parceladas ativas</h2>
            </div>
          </div>
          <div id="installmentOverview" class="stack-list"></div>
        </section>
      </section>
    </main>

    <div id="toastViewport" class="toast-viewport" aria-live="polite" aria-atomic="true"></div>

    <script src="app.js"></script>
  </body>
</html>
